<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOCTURNE</title>
<style>
  :root {
    --gold: #e8b878;
    --cream: #f4e8d4;
    --ink: #1a1420;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:#0e0a14; overflow:hidden;
    font-family: 'Georgia', 'Times New Roman', serif; color:#f4e8d4; }
  #wrap { position:fixed; inset:0; display:grid; place-items:center; }
  canvas { display:block; box-shadow:0 0 120px rgba(0,0,0,0.8); }
  #hud {
    position:fixed; top:26px; left:0; width:100%; text-align:center;
    pointer-events:none; user-select:none; z-index:5;
  }
  #hud .clock { font-size:15px; letter-spacing:8px; opacity:0.7; text-transform:uppercase; }
  #hud .dist { font-size:11px; letter-spacing:4px; opacity:0.35; margin-top:6px; }
  #glow {
    position:fixed; bottom:30px; left:0; width:100%; text-align:center;
    font-size:11px; letter-spacing:5px; opacity:0.3; text-transform:uppercase;
    pointer-events:none; user-select:none;
  }
  #title {
    position:fixed; inset:0; z-index:10; display:grid; place-items:center;
    text-align:center; background:radial-gradient(ellipse at 50% 40%, rgba(30,20,35,0.3), #0e0a14 75%);
    transition:opacity 1s ease;
  }
  #title.hidden { opacity:0; pointer-events:none; }
  #title h1 {
    font-size:clamp(52px,13vw,140px); font-weight:400; letter-spacing:20px;
    color:var(--gold); text-shadow:0 0 60px rgba(232,184,120,0.4); margin-left:20px;
  }
  #title .sub { font-size:13px; letter-spacing:7px; opacity:0.5; text-transform:uppercase; margin-top:18px; line-height:2.4; font-style:italic;}
  #title .go { margin-top:40px; font-size:11px; letter-spacing:6px; opacity:0.4;
    text-transform:uppercase; animation:breathe 2.4s ease-in-out infinite; }
  @keyframes breathe { 0%,100%{opacity:0.2} 50%{opacity:0.7} }
  .vig { position:fixed; inset:0; pointer-events:none; z-index:4;
    box-shadow:inset 0 0 200px rgba(0,0,0,0.55); }

  /* --- menu garage --- */
  #title .menu { max-width:640px; padding:0 24px; }
  #garage { display:flex; gap:14px; justify-content:center; margin-top:34px; flex-wrap:wrap; }
  .carCard {
    width:150px; padding:16px 12px; border:1px solid rgba(232,184,120,0.2);
    border-radius:10px; cursor:pointer; background:rgba(20,14,26,0.4);
    transition:all .25s ease; text-align:center;
  }
  .carCard:hover { border-color:rgba(232,184,120,0.5); transform:translateY(-3px); }
  .carCard.sel { border-color:var(--gold); background:rgba(232,184,120,0.08);
    box-shadow:0 0 30px rgba(232,184,120,0.15); }
  .carCard canvas { width:126px; height:64px; }
  .carCard .nm { font-size:12px; letter-spacing:2px; margin-top:8px; text-transform:uppercase; opacity:0.85; }
  .specs { margin-top:24px; font-size:11px; letter-spacing:3px; opacity:0.55;
    text-transform:uppercase; min-height:16px; }
  #startBtn { cursor:pointer; }
  #startBtn:hover { opacity:0.9 !important; }

  /* --- compteur de vitesse --- */
  #speedo { position:fixed; right:28px; bottom:24px; z-index:6; width:180px; height:180px;
    display:none; place-items:center; }
  #speedo.on { display:grid; }
  #dial { position:absolute; inset:0; }
  #gear { position:absolute; bottom:44px; font-size:20px; letter-spacing:2px;
    color:var(--gold); font-family:'Georgia',serif; opacity:0.9; }

  /* --- alerte radar --- */
  #radarAlert { position:fixed; top:44%; left:50%; transform:translate(-50%,-50%);
    z-index:7; text-align:center; pointer-events:none; opacity:0; transition:opacity .2s; }
  #radarAlert.show { opacity:1; }
  #radarAlert .big { font-size:52px; letter-spacing:6px; color:var(--gold);
    text-shadow:0 0 40px rgba(232,184,120,0.6); }
  #radarAlert .lbl { font-size:12px; letter-spacing:6px; opacity:0.7; text-transform:uppercase; }
  #radarAlert.record .big { color:#8affc0; text-shadow:0 0 50px rgba(138,255,192,0.7); }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div class="vig"></div>
<div id="hud">
  <div class="clock" id="clock">18:42</div>
  <div class="dist" id="dist">RIVIERA · 0 KM</div>
</div>

<!-- alerte radar -->
<div id="radarAlert"></div>

<!-- compteur de vitesse -->
<div id="speedo">
  <canvas id="dial" width="180" height="180"></canvas>
  <div id="gear">1</div>
</div>

<div id="glow">↑ accélérer &nbsp;·&nbsp; ← → diriger &nbsp;·&nbsp; ↓ freiner &nbsp;·&nbsp; ESPACE turbo &nbsp;·&nbsp; lève le pied dans les virages</div>

<div id="title">
  <div class="menu">
    <h1>NOCTURNE</h1>
    <div class="sub">choisis ta voiture</div>
    <div id="garage"></div>
    <div class="specs" id="specs"></div>
    <div class="go" id="startBtn">prendre le volant</div>
  </div>
</div>


<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const titleEl = document.getElementById('title');
const clockEl = document.getElementById('clock');
const distEl = document.getElementById('dist');

let W,H;
function resize(){
  W = cv.width = Math.min(window.innerWidth, 1200);
  H = cv.height = Math.min(window.innerHeight, 760);
}
resize(); addEventListener('resize', resize);

// ---------- input ----------
const keys = {};
addEventListener('keydown', e=>{ keys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault(); });
addEventListener('keyup', e=>{ keys[e.key]=false; });
let started=false;

// ---------- voitures sélectionnables ----------
// vmax élevée = plus rapide en ligne droite mais dérape tôt si grip faible
const CARS = [
  { id:'testarossa', name:'Testarossa', body:[206,26,22], vmax:290, accel:0.11, grip:1.05 },
  { id:'stradale',   name:'Stradale',   body:[240,210,40], vmax:330, accel:0.14, grip:0.78 },
  { id:'notte',      name:'Notte',      body:[30,34,48],   vmax:262, accel:0.10, grip:1.35 },
  { id:'argento',    name:'Argento',    body:[210,214,222],vmax:300, accel:0.12, grip:1.0 },
];
let carChoice = CARS[0];

// ---------- state ----------
let speed=0;                     // vitesse interne (unités route)
let maxSpeed=14;                 // recalculé selon la voiture
let curve=0, targetCurve=0;
let carX=0;
let carVX=0;                     // vélocité latérale (inertie)
let roadPos=0;
let dayT=0;
let time=0;
let shake=0;                     // secousse écran
let kmh=0;                       // vitesse affichée
let boost=1;                     // jauge de turbo 0..1
let boosting=false;              // turbo actif cette frame
let grip=0;                      // adhérence perdue en virage rapide (0=ok, 1=dérape)
let boostFlash=0;

// ---------- radars ----------
const radars=[];
for(let i=0;i<8;i++) radars.push({ z:600+i*900+Math.random()*300, best:0, side:Math.random()>.5?1:-1 });
let radarAlertT=0;
const radarAlertEl=document.getElementById('radarAlert');

// palettes de ciel : golden hour -> dusk -> night
const skies = [
  { top:[42,28,58],  mid:[196,120,86], low:[236,176,110], sun:[255,214,150] }, // golden
  { top:[28,20,44],  mid:[120,66,88],  low:[180,96,110],  sun:[255,180,140] }, // dusk
  { top:[14,12,30],  mid:[40,32,66],   low:[70,50,92],    sun:[220,150,170] }, // twilight
  { top:[6,7,20],    mid:[16,16,40],   low:[30,26,58],    sun:[150,160,220] }  // night
];
function lerp(a,b,t){ return a+(b-a)*t; }
function lerpCol(c1,c2,t){ return [lerp(c1[0],c2[0],t),lerp(c1[1],c2[1],t),lerp(c1[2],c2[2],t)]; }
function rgb(c,a=1){ return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`; }
function skyAt(t){
  const seg = Math.min(skies.length-2, Math.floor(t*(skies.length-1)));
  const f = t*(skies.length-1) - seg;
  const A=skies[seg], B=skies[seg+1];
  return {
    top: lerpCol(A.top,B.top,f), mid: lerpCol(A.mid,B.mid,f),
    low: lerpCol(A.low,B.low,f), sun: lerpCol(A.sun,B.sun,f)
  };
}

// palmiers & montagnes procéduraux (positions fixes défilant)
const palms=[]; for(let i=0;i<24;i++) palms.push({z:i*40+Math.random()*30, side:Math.random()>.5?1:-1, h:0.7+Math.random()*0.5});
const stars=[]; for(let i=0;i<120;i++) stars.push({x:Math.random(), y:Math.random()*0.55, s:Math.random()*1.4+0.3, tw:Math.random()*6});

// --- décor bord de route : maisons & cyprès, défile AVEC la voiture (on les dépasse) ---
const ROAD_TYPES=['villa','villa','villa','cypress','cypress'];
const scenery=[];
for(let i=0;i<20;i++){
  const type=ROAD_TYPES[(Math.random()*ROAD_TYPES.length)|0];
  scenery.push({
    z:i*52+Math.random()*36,
    type,
    side: Math.random()>.35 ? -1 : 1,   // majorité côté colline
    scale:0.85+Math.random()*0.5,
    seed:Math.random()
  });
}

// --- éléments marins LOINTAINS : ancrés, dérivent très lentement, restent dans le décor ---
const seaCraft=[
  { type:'yacht', u:0.22, depth:0.30, scale:1.0,  drift:0.0006, seed:0.2 },
  { type:'yacht', u:0.62, depth:0.16, scale:0.7,  drift:0.0004, seed:0.7 },
  { type:'jet',   u:0.80, depth:0.42, scale:0.9,  drift:0.0009, seed:0.5 },
];

let lights=[];   // reflets dorés à collecter
let collected=0;

// ---------- loop ----------
function loop(){
  requestAnimationFrame(loop);
  time+=0.016;

  const horizon = H*0.42;
  const sky = skyAt(dayT);

  // secousse caméra (vibration moteur + off-road)
  ctx.save();
  if(shake>0){
    const sx=(Math.random()-0.5)*shake, sy=(Math.random()-0.5)*shake;
    ctx.translate(sx,sy);
  }

  // --- ciel ---
  const g = ctx.createLinearGradient(0,0,0,horizon);
  g.addColorStop(0, rgb(sky.top));
  g.addColorStop(0.6, rgb(sky.mid));
  g.addColorStop(1, rgb(sky.low));
  ctx.fillStyle=g; ctx.fillRect(0,0,W,horizon);

  // --- étoiles (apparaissent la nuit) ---
  if(dayT>0.5){
    const sa=(dayT-0.5)/0.5;
    for(const s of stars){
      const tw=0.5+0.5*Math.sin(time*2+s.tw);
      ctx.fillStyle=`rgba(240,240,255,${sa*tw*0.9})`;
      ctx.beginPath(); ctx.arc(s.x*W, s.y*horizon, s.s, 0, 7); ctx.fill();
    }
  }

  // --- soleil / lune ---
  const sunY = horizon - 40 + dayT*130;   // descend puis devient lune basse
  const sunX = W*0.5 - curve*220;
  const sunR = 54 - dayT*18;
  const sg = ctx.createRadialGradient(sunX,sunY,4,sunX,sunY,sunR*3.4);
  sg.addColorStop(0, rgb(sky.sun,0.95));
  sg.addColorStop(0.3, rgb(sky.sun,0.5));
  sg.addColorStop(1, rgb(sky.sun,0));
  ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(sunX,sunY,sunR*3.4,0,7); ctx.fill();
  ctx.fillStyle=rgb(sky.sun, 0.9-dayT*0.3);
  ctx.beginPath(); ctx.arc(sunX,sunY,sunR,0,7); ctx.fill();

  // --- montagnes (parallaxe) ---
  function ridge(baseY, amp, col, off){
    ctx.beginPath(); ctx.moveTo(0,horizon);
    for(let x=0;x<=W;x+=24){
      const y=baseY + Math.sin(x*0.006+off)*amp + Math.sin(x*0.013+off*1.7)*amp*0.5;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(W,horizon); ctx.closePath(); ctx.fillStyle=col; ctx.fill();
  }
  ridge(horizon-70, 34, rgb(lerpCol(sky.mid,sky.top,0.4),0.85), curve*2);
  ridge(horizon-34, 22, rgb(lerpCol(sky.mid,sky.top,0.65),0.9), curve*3+2);

  // --- brume atmosphérique à la base des montagnes ---
  const mist=ctx.createLinearGradient(0,horizon-40,0,horizon+6);
  mist.addColorStop(0,'rgba(0,0,0,0)');
  mist.addColorStop(1, rgb(sky.low, 0.5));
  ctx.fillStyle=mist; ctx.fillRect(0,horizon-40,W,46);

  // --- mer (reflet du ciel) ---
  const seaG=ctx.createLinearGradient(0,horizon,0,horizon+60);
  seaG.addColorStop(0, rgb(sky.low,0.8));
  seaG.addColorStop(1, rgb(lerpCol(sky.low,sky.top,0.5)));
  ctx.fillStyle=seaG; ctx.fillRect(0,horizon,W,60);
  // colonne de lumière du soleil sur l'eau (chemin doré)
  for(let r=0;r<26;r++){
    const yy=horizon+r*2;
    const p=r/26;
    const width=lerp(30,150,p);           // s'élargit vers l'avant
    const wobble=Math.sin(time*3 + r*0.6)*6;
    ctx.fillStyle=rgb(sky.sun, (1-p)*0.5);
    ctx.fillRect(sunX-width/2+wobble, yy, width, 1.3);
    // éclats scintillants
    if(Math.random()<0.5){
      ctx.fillStyle=rgb(sky.sun, (1-p)*0.7*Math.random());
      ctx.fillRect(sunX+(Math.random()-0.5)*width, yy, Math.random()*8+2, 1.3);
    }
  }

  // --- yachts & jet posés sur la mer (éléments lointains) ---
  drawSeaScenery(horizon, sky);

  // --- ROUTE (pseudo-3D) ---
  const roadTop=horizon+60;
  drawRoad(roadTop, sky);

  // --- voiture joueur ---
  drawCar(sky);

  // --- lumières à collecter ---
  updateLights(roadTop, sky);

  // --- lignes de vitesse (streaks) à haute vitesse, renforcées en boost ---
  const sp = speed/maxSpeed;
  const streakOn = sp>0.55 || boostFlash>0.1;
  if(streakOn){
    const inten=Math.max((sp-0.55)/0.45, boostFlash);
    const n = boostFlash>0.1 ? 26 : 14;
    ctx.save(); ctx.globalCompositeOperation='lighter';
    const vpx=W/2 - curve*180, vpy=horizon+60;
    const col = boostFlash>0.1 ? [150,255,200] : sky.sun;
    for(let i=0;i<n;i++){
      const ang=(i/n)*Math.PI*2 + time*0.5;
      const rad=180+Math.random()*300;
      const x1=vpx+Math.cos(ang)*rad*0.35, y1=vpy+Math.sin(ang)*rad*0.35;
      const x2=vpx+Math.cos(ang)*rad, y2=vpy+Math.sin(ang)*rad;
      ctx.strokeStyle=rgb(col, 0.09*inten*Math.random());
      ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    }
    ctx.restore();
  }

  // --- halo turbo (vignette verte pulsée) ---
  if(boostFlash>0.02){
    const bv=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.75);
    bv.addColorStop(0,'rgba(0,0,0,0)');
    bv.addColorStop(1,`rgba(80,255,170,${0.18*boostFlash})`);
    ctx.fillStyle=bv; ctx.fillRect(0,0,W,H);
  }

  // --- reflet doré sur le pare-brise / capot (signature) ---
  const hazeG=ctx.createLinearGradient(0,0,0,H);
  hazeG.addColorStop(0, rgb(sky.sun, 0.05*(1-dayT)));
  hazeG.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle=hazeG; ctx.fillRect(0,0,W,H);

  ctx.restore();   // ferme le shake caméra

  // --- grain cinématographique (hors shake, couvre tout l'écran) ---
  drawGrain();

  if(started) update();
  updateHud();
}

// grain : petit tile de bruit recyclé et décalé chaque frame
let grainTile=null;
function makeGrain(){
  const s=140; const t=document.createElement('canvas'); t.width=t.height=s;
  const tc=t.getContext('2d'); const img=tc.createImageData(s,s);
  for(let i=0;i<img.data.length;i+=4){
    const v=200+Math.random()*55;
    img.data[i]=img.data[i+1]=img.data[i+2]=v;
    img.data[i+3]=Math.random()*22;
  }
  tc.putImageData(img,0,0); grainTile=t;
}
function drawGrain(){
  if(!grainTile) makeGrain();
  ctx.save();
  ctx.globalCompositeOperation='overlay';
  ctx.globalAlpha=0.6;
  const ox=-Math.random()*140, oy=-Math.random()*140;
  for(let x=ox;x<W;x+=140) for(let y=oy;y<H;y+=140) ctx.drawImage(grainTile,x,y);
  ctx.restore();
}

// ---------- route ----------
function drawRoad(top, sky){
  const cx=W/2;
  const roadW=W*0.14, botW=W*0.95;
  for(let i=0;i<=H-top;i+=2){
    const p=i/(H-top);                 // 0 haut -> 1 bas
    const persp=p*p;
    const w=lerp(roadW, botW, p);
    const bend=curve*(1-p)*(1-p)*W*0.9;
    const cxx=cx + bend - carX*lerp(20,140,p);
    const y=top+i;
    // bandes d'asphalte
    const shade= (Math.floor((roadPos*0.15 + p*30)) % 2===0)? 0.0 : 0.04;
    ctx.fillStyle=`rgba(${20+shade*200|0},${18+shade*160|0},${26+shade*180|0},1)`;
    ctx.fillRect(cxx-w/2, y, w, 3);
    // bas-côté / herbe sombre
    const grass=rgb(lerpCol([26,30,20],sky.low,0.15*p),1);
    ctx.fillStyle=grass;
    ctx.fillRect(0,y,cxx-w/2,3);
    ctx.fillRect(cxx+w/2,y,W-(cxx+w/2),3);
    // ligne centrale pointillée
    if(Math.floor(roadPos*0.3 + p*40)%2===0){
      ctx.fillStyle=rgb(sky.sun,0.5*(1-dayT)+0.2);
      ctx.fillRect(cxx-w*0.012, y, w*0.024, 3);
    }
    // bordures lumineuses
    ctx.fillStyle=rgb(sky.sun,0.15+0.2*(1-p));
    ctx.fillRect(cxx-w/2, y, w*0.02, 3);
    ctx.fillRect(cxx+w/2-w*0.02, y, w*0.02, 3);
  }
  // villas & cyprès en bord de route (dessinés derrière les palmiers)
  for(const sc of scenery){
    const zz=(((sc.z - roadPos)%1040)+1040)%1040;
    const p=1-zz/1040;
    if(p<0.03 || p>0.82) continue;                 // ne va pas jusqu'au zoom extrême
    // fondu : apparaît dans la brume (p petit), s'efface en sortant (p grand)
    const fadeIn=Math.min(1,(p-0.03)/0.12);
    const fadeOut=Math.min(1,(0.82-p)/0.16);
    const alpha=Math.max(0,Math.min(1,fadeIn*fadeOut));
    const y=top+(H-top)*p*p;
    const bend=curve*(1-p)*(1-p)*W*0.9;
    const w=lerp(W*0.14,W*0.95,p);
    const cxx=cx+bend - carX*lerp(20,140,p);
    const px=cxx + sc.side*(w*0.85);
    const s=lerp(6,150,p)*sc.scale;
    ctx.save(); ctx.globalAlpha=alpha;
    if(sc.type==='villa') drawVilla(px, y, s, sky, sc.seed);
    else drawCypress(px, y, s*0.9, sky);
    ctx.restore();
  }
  // palmiers en silhouette
  for(const pm of palms){
    const z=(pm.z - roadPos) ;
    let zz=((z%960)+960)%960;             // recycle
    const p=1-zz/960;
    if(p<0.02) continue;
    const y=top+(H-top)*p*p;
    const bend=curve*(1-p)*(1-p)*W*0.9;
    const w=lerp(W*0.14,W*0.95,p);
    const cxx=cx+bend - carX*lerp(20,140,p);
    const px=cxx + pm.side*(w*0.62);
    const ph=lerp(6,150,p)*pm.h;
    drawPalm(px, y, ph, rgb(lerpCol([10,8,16],sky.mid,0.12),1));
  }

  // --- radars (portiques au-dessus de la route) ---
  for(const rd of radars){
    const ahead = rd.z - roadPos;
    if(ahead<0 || ahead>900) continue;
    const p = 1 - ahead/900;                 // 0 loin -> 1 proche
    if(p<0.04) continue;
    const y=top+(H-top)*p*p;
    const bend=curve*(1-p)*(1-p)*W*0.9;
    const w=lerp(W*0.14,W*0.95,p);
    const cxx=cx+bend - carX*lerp(20,140,p);
    drawRadar(cxx, y, w, p, sky, rd);
  }
}

// portique radar : deux montants + poutre + boîtier flash
function drawRadar(cx, y, w, p, sky, rd){
  const postH=lerp(20,150,p);
  const half=w*0.62;
  const col=rgb(lerpCol([40,40,50], sky.mid, 0.15));
  const lw=Math.max(1,lerp(1,7,p));
  ctx.strokeStyle=col; ctx.lineWidth=lw;
  // montants
  ctx.beginPath(); ctx.moveTo(cx-half,y); ctx.lineTo(cx-half,y-postH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+half,y); ctx.lineTo(cx+half,y-postH); ctx.stroke();
  // poutre
  ctx.beginPath(); ctx.moveTo(cx-half,y-postH); ctx.lineTo(cx+half,y-postH); ctx.stroke();
  // boîtiers radar sur la poutre
  const boxW=lerp(3,20,p), boxH=lerp(2,12,p);
  ctx.fillStyle=col;
  ctx.fillRect(cx-boxW/2, y-postH-boxH*0.5, boxW, boxH);
  // objectif rouge (clignote légèrement)
  const blink=0.5+0.5*Math.sin(time*5 + rd.z);
  ctx.fillStyle=`rgba(255,60,70,${0.5+0.5*blink})`;
  ctx.beginPath(); ctx.arc(cx, y-postH-boxH*0.2, Math.max(1,lerp(1,4,p)), 0, 7); ctx.fill();
  // petit panneau "meilleur score" quand proche
  if(p>0.5 && rd.best>0){
    ctx.fillStyle=rgb(sky.sun, 0.5);
    ctx.font=`${Math.round(lerp(6,13,p))}px Georgia`; ctx.textAlign='center';
    ctx.fillText(`◎ ${rd.best}`, cx+half+lerp(6,26,p), y-postH*0.5);
    ctx.textAlign='left';
  }
}

// ---------- villa méditerranéenne ----------
function drawVilla(x, base, s, sky, seed){
  const wallCol=rgb(lerpCol([238,228,206], sky.sun, 0.26));
  const wallLit=rgb(lerpCol([248,240,220], sky.sun, 0.34));
  const wallShade=rgb(lerpCol([196,182,160], sky.mid, 0.22));
  const roofCol=rgb(lerpCol([176,98,66], sky.mid, 0.22));
  const roofDark=rgb(lerpCol([140,74,52], sky.top, 0.24));
  const winGlow=rgb(sky.sun, 0.45+0.4*dayT);
  const shutter=rgb(lerpCol([90,120,120], sky.mid, 0.2));
  const green=rgb(lerpCol([30,54,36], sky.mid, 0.14));
  const bw=s, bh=s*0.66;
  const x0=x-bw/2, y0=base-bh;

  // haie / verdure basse derrière (ancre la maison au sol)
  ctx.fillStyle=green;
  ctx.beginPath();
  ctx.ellipse(x0-s*0.1, base, s*0.28, s*0.12, 0,0,7);
  ctx.ellipse(x0+bw+s*0.08, base, s*0.24, s*0.1, 0,0,7); ctx.fill();

  // aile latérale (asymétrie selon seed) — dessinée avant le corps
  const aw=bw*0.55, ah=bh*0.72;
  const ax=seed>0.5 ? x0-aw*0.72 : x0+bw-aw*0.28;
  ctx.fillStyle=wallShade; ctx.fillRect(ax, base-ah, aw, ah);

  // corps principal, avec côté éclairé / côté ombre
  ctx.fillStyle=wallCol; ctx.fillRect(x0, y0, bw, bh);
  ctx.fillStyle=wallLit; ctx.fillRect(x0, y0, bw*0.5, bh);   // face au soleil
  ctx.fillStyle='rgba(0,0,0,0.08)'; ctx.fillRect(x0+bw*0.5, y0, bw*0.5, bh);

  // toits en tuiles avec débord et ombre sous l'avant-toit
  function roof(rx,ry,rw){
    ctx.fillStyle=roofCol; ctx.beginPath();
    ctx.moveTo(rx-rw*0.08, ry); ctx.lineTo(rx+rw+rw*0.08, ry);
    ctx.lineTo(rx+rw*0.92, ry-rw*0.16); ctx.lineTo(rx+rw*0.08, ry-rw*0.16);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle=roofDark; ctx.fillRect(rx-rw*0.08, ry, rw*1.16, rw*0.02); // ligne d'avant-toit
  }
  roof(ax, base-ah, aw);
  roof(x0, y0, bw);

  // fenêtres avec volets
  const cols=Math.max(2,Math.round(bw/(s*0.26))), rows=2;
  const ww=s*0.11, wh=s*0.16;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const wx=x0+bw*0.16 + c*(bw*0.68/(cols-1||1)) - ww/2;
    const wy=y0+bh*0.18 + r*(bh*0.4);
    // volets
    ctx.fillStyle=shutter;
    ctx.fillRect(wx-ww*0.4, wy, ww*0.34, wh);
    ctx.fillRect(wx+ww, wy, ww*0.34, wh);
    // vitre éclairée
    ctx.fillStyle=winGlow; ctx.fillRect(wx, wy, ww, wh);
    // croisillon
    ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=Math.max(0.5,s*0.006);
    ctx.beginPath(); ctx.moveTo(wx+ww/2,wy); ctx.lineTo(wx+ww/2,wy+wh);
    ctx.moveTo(wx,wy+wh/2); ctx.lineTo(wx+ww,wy+wh/2); ctx.stroke();
  }

  // terrasse / balustrade au sol
  ctx.fillStyle=wallLit; ctx.fillRect(x0-s*0.06, base-s*0.04, bw+s*0.12, s*0.04);
  ctx.strokeStyle=wallShade; ctx.lineWidth=Math.max(0.5,s*0.01);
  for(let i=0;i<=6;i++){ const bx=x0+i*(bw/6); ctx.beginPath();
    ctx.moveTo(bx,base-s*0.04); ctx.lineTo(bx,base); ctx.stroke(); }

  // porte-arche centrale
  ctx.fillStyle=rgb(lerpCol([80,64,58],sky.top,0.3));
  const dw=s*0.14;
  ctx.beginPath();
  ctx.moveTo(x-dw/2,base); ctx.lineTo(x-dw/2,base-s*0.22);
  ctx.arc(x,base-s*0.22,dw/2,Math.PI,0); ctx.lineTo(x+dw/2,base); ctx.fill();

  // variante : tour d'angle avec son propre toit (villas les plus grandes)
  if(seed>0.55){
    const tw=bw*0.3, th=bh*0.55;
    const tx=seed>0.78 ? x0-tw*0.5 : x0+bw-tw*0.5;
    ctx.fillStyle=wallShade; ctx.fillRect(tx, y0-th, tw, th+bh);
    ctx.fillStyle=wallLit; ctx.fillRect(tx, y0-th, tw*0.45, th+bh);
    // toit de la tour
    ctx.fillStyle=roofDark; ctx.beginPath();
    ctx.moveTo(tx-tw*0.12, y0-th); ctx.lineTo(tx+tw+tw*0.12, y0-th);
    ctx.lineTo(tx+tw*0.55, y0-th-tw*0.4); ctx.closePath(); ctx.fill();
    // fenêtre haute de la tour
    ctx.fillStyle=winGlow; ctx.fillRect(tx+tw*0.3, y0-th*0.6, tw*0.4, th*0.4);
  }

  // variante : pergola/terrasse ombragée au sol (poteaux + poutres)
  if(seed<0.4){
    const pgx=x0+bw*0.1, pgw=bw*0.8, pgy=base, pgh=s*0.16;
    ctx.strokeStyle=rgb(lerpCol([120,96,70],sky.mid,0.2)); ctx.lineWidth=Math.max(1,s*0.02);
    for(let i=0;i<=4;i++){ const ppx=pgx+i*(pgw/4);
      ctx.beginPath(); ctx.moveTo(ppx,pgy); ctx.lineTo(ppx,pgy-pgh); ctx.stroke(); }
    ctx.beginPath(); ctx.moveTo(pgx,pgy-pgh); ctx.lineTo(pgx+pgw,pgy-pgh); ctx.stroke();
    // feuillage grimpant
    ctx.fillStyle=green; ctx.globalAlpha=0.7;
    ctx.beginPath(); ctx.ellipse(pgx+pgw*0.5, pgy-pgh, pgw*0.5, s*0.05,0,0,7); ctx.fill();
    ctx.globalAlpha=1;
  }

  // petit cyprès collé à la villa (comme sur les photos)
  drawCypress(seed>0.5 ? x0+bw+s*0.12 : x0-s*0.12, base, s*0.9, sky);
}

// ---------- cyprès ----------
function drawCypress(x, base, h, sky){
  const col=rgb(lerpCol([26,44,30], sky.mid, 0.14));
  const sway=Math.sin(time*1.1 + x*0.05)*h*0.015;
  ctx.fillStyle=col;
  ctx.beginPath();
  ctx.moveTo(x, base-h);
  ctx.quadraticCurveTo(x+h*0.14+sway, base-h*0.5, x+h*0.06, base);
  ctx.lineTo(x-h*0.06, base);
  ctx.quadraticCurveTo(x-h*0.14+sway, base-h*0.5, x, base-h);
  ctx.fill();
}

// ---------- yachts & jet ancrés au loin (couche de fond lente) ----------
function drawSeaScenery(horizon, sky){
  const seaTop=horizon, seaBot=horizon+58;
  for(const sc of seaCraft){
    // dérive horizontale très lente + parallaxe du virage (léger, car c'est loin)
    let u=(sc.u + time*sc.drift) % 1; if(u<0) u+=1;
    const parallax = curve*(1-sc.depth)*90;         // les plus lointains bougent moins
    const x = u*W + parallax;
    const y = lerp(seaTop+6, seaBot-14, sc.depth);   // depth 0=horizon lointain, 1=proche
    const s = lerp(16, 40, sc.depth) * sc.scale;
    const bobY = Math.sin(time*1.2 + sc.seed*9)*s*0.03;  // léger tangage
    // fondu près des bords de l'écran pour éviter les coupures franches
    const edge = Math.min(1, x/ (W*0.12), (W-x)/(W*0.12));
    ctx.save(); ctx.globalAlpha=Math.max(0.15, Math.min(1, edge));
    if(sc.type==='yacht') drawYacht(x, y+bobY, s, sky);
    else drawJet(x, y+bobY, s, sky);
    ctx.restore();
  }
}
function drawYacht(x,y,s,sky){
  const hull=rgb(lerpCol([246,246,250], sky.sun,0.18));
  const deck=rgb(lerpCol([224,224,230], sky.mid,0.14));
  const shade=rgb(lerpCol([172,176,186], sky.mid,0.22));
  const win=rgb(lerpCol([40,50,70],sky.mid,0.2));
  // waterline
  const wl=y;
  // coque effilée (proue à droite, poupe à gauche)
  ctx.fillStyle=hull;
  ctx.beginPath();
  ctx.moveTo(x-s*0.95, wl-s*0.02);
  ctx.lineTo(x+s*0.7, wl-s*0.02);
  ctx.quadraticCurveTo(x+s*1.15, wl-s*0.04, x+s*1.05, wl-s*0.2);   // proue relevée
  ctx.lineTo(x-s*0.85, wl-s*0.2);
  ctx.quadraticCurveTo(x-s*0.98, wl-s*0.12, x-s*0.95, wl-s*0.02);
  ctx.closePath(); ctx.fill();
  // ligne de flottaison teintée
  ctx.fillStyle=shade; ctx.fillRect(x-s*0.9, wl-s*0.06, s*1.9, s*0.05);
  // pont principal
  ctx.fillStyle=deck;
  ctx.beginPath();
  ctx.moveTo(x-s*0.78, wl-s*0.2);
  ctx.lineTo(x+s*0.85, wl-s*0.2);
  ctx.lineTo(x+s*0.7, wl-s*0.42);
  ctx.lineTo(x-s*0.72, wl-s*0.42); ctx.closePath(); ctx.fill();
  // second pont, plus court, décalé vers l'arrière
  ctx.fillStyle=hull;
  ctx.beginPath();
  ctx.moveTo(x-s*0.6, wl-s*0.42);
  ctx.lineTo(x+s*0.42, wl-s*0.42);
  ctx.lineTo(x+s*0.3, wl-s*0.62);
  ctx.lineTo(x-s*0.55, wl-s*0.62); ctx.closePath(); ctx.fill();
  // passerelle / timonerie
  ctx.fillStyle=deck;
  ctx.beginPath();
  ctx.moveTo(x-s*0.4, wl-s*0.62);
  ctx.lineTo(x+s*0.1, wl-s*0.62);
  ctx.lineTo(x, wl-s*0.8);
  ctx.lineTo(x-s*0.34, wl-s*0.8); ctx.closePath(); ctx.fill();
  // mât
  ctx.strokeStyle=shade; ctx.lineWidth=Math.max(1,s*0.03);
  ctx.beginPath(); ctx.moveTo(x-s*0.18, wl-s*0.8); ctx.lineTo(x-s*0.12, wl-s*1.02); ctx.stroke();
  // rangées de hublots éclairés
  ctx.fillStyle=dayT>0.3 ? rgb(sky.sun,0.7) : win;
  for(let i=0;i<7;i++) ctx.fillRect(x-s*0.7+i*s*0.22, wl-s*0.34, s*0.12, s*0.05);
  for(let i=0;i<5;i++) ctx.fillRect(x-s*0.5+i*s*0.2, wl-s*0.56, s*0.1, s*0.045);
  // reflet ondulant dans l'eau
  ctx.save(); ctx.globalAlpha=0.22;
  for(let r=0;r<5;r++){
    const wob=Math.sin(time*2 + r*0.8 + x*0.05)*s*0.04;
    ctx.fillStyle=hull;
    ctx.fillRect(x-s*0.7+wob, wl+s*0.02+r*s*0.06, s*1.5, s*0.03);
  }
  ctx.restore();
}
function drawJet(x,y,s,sky){
  const body=rgb(lerpCol([230,232,238], sky.sun,0.22));
  const shade=rgb(lerpCol([170,174,184], sky.mid,0.2));
  const wl=y;
  // reflet au sol/eau d'abord
  ctx.save(); ctx.globalAlpha=0.18; ctx.fillStyle=body;
  ctx.beginPath(); ctx.ellipse(x, wl+s*0.14, s*1.0, s*0.06,0,0,7); ctx.fill();
  ctx.restore();
  // aile arrière (delta) sous le fuselage
  ctx.fillStyle=shade;
  ctx.beginPath();
  ctx.moveTo(x-s*0.1, wl-s*0.06);
  ctx.lineTo(x+s*0.7, wl+s*0.04);
  ctx.lineTo(x+s*0.2, wl-s*0.1); ctx.closePath(); ctx.fill();
  // fuselage fin et allongé, nez arrondi à droite
  ctx.fillStyle=body;
  ctx.beginPath();
  ctx.moveTo(x-s*1.05, wl-s*0.1);
  ctx.quadraticCurveTo(x+s*1.0, wl-s*0.18, x+s*1.12, wl-s*0.08);
  ctx.quadraticCurveTo(x+s*1.0, wl-s*0.02, x-s*0.95, wl-s*0.04);
  ctx.quadraticCurveTo(x-s*1.1, wl-s*0.07, x-s*1.05, wl-s*0.1);
  ctx.closePath(); ctx.fill();
  // dérive (empennage vertical) à gauche/arrière
  ctx.fillStyle=body;
  ctx.beginPath();
  ctx.moveTo(x-s*0.86, wl-s*0.12);
  ctx.quadraticCurveTo(x-s*1.02, wl-s*0.5, x-s*1.08, wl-s*0.52);
  ctx.lineTo(x-s*0.95, wl-s*0.12); ctx.closePath(); ctx.fill();
  // stabilisateur horizontal
  ctx.fillStyle=shade;
  ctx.beginPath();
  ctx.moveTo(x-s*0.95, wl-s*0.12); ctx.lineTo(x-s*1.18, wl-s*0.14);
  ctx.lineTo(x-s*0.95, wl-s*0.08); ctx.closePath(); ctx.fill();
  // hublots
  ctx.fillStyle=dayT>0.3 ? rgb(sky.sun,0.6) : rgb([40,50,70]);
  for(let i=0;i<8;i++) ctx.fillRect(x-s*0.75+i*s*0.2, wl-s*0.11, s*0.07, s*0.035);
  // cockpit
  ctx.fillStyle=rgb(lerpCol([30,40,60],sky.mid,0.2));
  ctx.beginPath(); ctx.ellipse(x+s*0.9, wl-s*0.1, s*0.12,s*0.05,0,0,7); ctx.fill();
  // feux nav (rouge fixe + balise clignotante)
  ctx.fillStyle='rgba(255,60,60,0.95)';
  ctx.beginPath(); ctx.arc(x-s*1.06,wl-s*0.5,s*0.045,0,7); ctx.fill();
  const blink=0.4+0.6*Math.abs(Math.sin(time*3));
  ctx.fillStyle=`rgba(255,255,200,${blink})`;
  ctx.beginPath(); ctx.arc(x+s*1.1,wl-s*0.06,s*0.04,0,7); ctx.fill();
}

function drawPalm(x,base,h,col){
  const sway=Math.sin(time*1.2 + x*0.03)*h*0.02;
  // tronc courbé et segmenté, s'affine vers le haut
  ctx.strokeStyle=col; ctx.lineCap='round';
  const segs=8;
  let px=x, py=base;
  const tipx=x+h*0.04+sway, tipy=base-h;
  for(let i=1;i<=segs;i++){
    const t=i/segs;
    const nx=lerp(x, tipx, t)+Math.sin(t*3)*h*0.03;
    const ny=lerp(base, tipy, t);
    ctx.lineWidth=Math.max(1,h*0.05*(1-t*0.7));
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(nx,ny); ctx.stroke();
    px=nx; py=ny;
  }
  const tx=tipx, ty=tipy;
  // couronne : frondes retombantes
  ctx.lineWidth=Math.max(1,h*0.016);
  for(let a=0;a<9;a++){
    const ang=(-Math.PI*0.5)+(a-4)*0.4 + sway*0.01;
    const len=h*(0.4+ (a%2?0.14:0));
    const midx=tx+Math.cos(ang)*len*0.55;
    const midy=ty+Math.sin(ang)*len*0.55;
    const endx=tx+Math.cos(ang)*len;
    const endy=ty+Math.sin(ang)*len + len*0.4;   // retombée
    ctx.beginPath(); ctx.moveTo(tx,ty);
    ctx.quadraticCurveTo(midx,midy,endx,endy); ctx.stroke();
  }
  // petit régime de dattes
  ctx.fillStyle=col; ctx.beginPath(); ctx.arc(tx,ty+h*0.02,h*0.03,0,7); ctx.fill();
}

// ---------- voiture ----------
function drawCar(sky){
  const cx=W/2 + carX*W*0.02;
  const y=H-88;
  // teintes carrosserie dérivées de la voiture choisie, modulées par la lumière
  const B=carChoice.body;
  const redHi = lerpCol([Math.min(255,B[0]+50),Math.min(255,B[1]+38),Math.min(255,B[2]+20)], sky.sun, 0.30);
  const redMid= lerpCol(B, sky.mid, 0.16);
  const redLo = lerpCol([B[0]*0.58|0,B[1]*0.5|0,B[2]*0.6|0], sky.top, 0.30);
  const redShadow = lerpCol([B[0]*0.3|0,B[1]*0.28|0,B[2]*0.34|0], [0,0,0], 0.2);
  const chrome  = rgb(sky.sun, 0.85);

  ctx.save();
  ctx.translate(cx,y);
  const steer=(keys.ArrowLeft?-1:0)+(keys.ArrowRight?1:0);
  const lean=curve*36 + steer*5;
  ctx.rotate(lean*0.0008);
  const bob=Math.sin(time*8)*speed*0.05;
  ctx.translate(0,bob);

  // --- ombre portée douce ---
  const shg=ctx.createRadialGradient(0,62,10,0,62,160);
  shg.addColorStop(0,'rgba(0,0,0,0.55)'); shg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=shg; ctx.beginPath(); ctx.ellipse(0,62,160,26,0,0,7); ctx.fill();

  // --- pneus larges (la Testarossa est très large à l'arrière) ---
  ctx.fillStyle='#0a0a0e';
  roundRect(-158,32,40,36,9); ctx.fill();
  roundRect(118,32,40,36,9); ctx.fill();

  // ============ CORPS Testarossa : très large, bas, épaules marquées ============
  ctx.beginPath();
  ctx.moveTo(-162,46);                       // coin bas gauche
  ctx.quadraticCurveTo(-166,18,-150,12);     // aile arrière gauche bombée
  ctx.lineTo(-120,10);
  ctx.quadraticCurveTo(-96,8,-92,-2);        // épaule
  ctx.quadraticCurveTo(-86,-20,-58,-24);     // montée vers le pavillon
  ctx.lineTo(58,-24);
  ctx.quadraticCurveTo(86,-20,92,-2);
  ctx.quadraticCurveTo(96,8,120,10);
  ctx.lineTo(150,12);
  ctx.quadraticCurveTo(166,18,162,46);       // aile arrière droite
  ctx.quadraticCurveTo(162,56,130,56);
  ctx.lineTo(-130,56);
  ctx.quadraticCurveTo(-162,56,-162,46);
  ctx.closePath();
  const bgc=ctx.createLinearGradient(0,-24,0,56);
  bgc.addColorStop(0, rgb(redHi));
  bgc.addColorStop(0.40, rgb(redMid));
  bgc.addColorStop(0.80, rgb(redLo));
  bgc.addColorStop(1, rgb(redShadow));
  ctx.fillStyle=bgc; ctx.fill();

  // reflet du couchant qui balaie la carrosserie
  const swp=ctx.createLinearGradient(-162,0,162,0);
  swp.addColorStop(0,'rgba(0,0,0,0)');
  swp.addColorStop(0.5, rgb(sky.sun,0.22));
  swp.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=swp; roundRect(-162,4,324,8,4); ctx.fill();

  // --- pavillon / lunette arrière ---
  ctx.beginPath();
  ctx.moveTo(-56,-22);
  ctx.quadraticCurveTo(-60,-6,-54,8);
  ctx.lineTo(54,8);
  ctx.quadraticCurveTo(60,-6,56,-22);
  ctx.closePath();
  const wg=ctx.createLinearGradient(0,-22,0,8);
  wg.addColorStop(0, rgb(sky.sun,0.45));
  wg.addColorStop(0.5, rgb(lerpCol(sky.mid,[8,8,14],0.5)));
  wg.addColorStop(1,'rgba(6,6,12,0.95)');
  ctx.fillStyle=wg; ctx.fill();
  // montants + intérieur clair aperçu
  ctx.fillStyle='rgba(180,150,120,0.25)';
  roundRect(-40,-6,80,10,3); ctx.fill();

  // --- capot moteur noir ajouré (grille horizontale centrale) ---
  ctx.fillStyle='#111014';
  roundRect(-46,8,92,10,3); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.lineWidth=1;
  for(let i=-4;i<=4;i++){ ctx.beginPath(); ctx.moveTo(i*10,9); ctx.lineTo(i*10,17); ctx.stroke(); }

  // ====== SIGNATURE Testarossa : bandes horizontales pleine largeur ======
  // bandeau des feux : rouge foncé strié de noir, sur toute la largeur arrière
  const bandY=20, bandH=18;
  ctx.fillStyle='#1a0407';
  roundRect(-150,bandY,300,bandH,5); ctx.fill();
  // stries horizontales (les fameuses lamelles)
  for(let i=0;i<6;i++){
    const yy=bandY+2+i*2.6;
    ctx.fillStyle = i<3 ? 'rgba(220,30,30,0.9)' : 'rgba(20,4,6,0.9)';
    ctx.fillRect(-150,yy,300,1.4);
  }
  // blocs de feux rouges translucides gauche/droite
  ctx.globalCompositeOperation='lighter';
  for(const side of [-1,1]){
    const lx=side*112;
    const fg=ctx.createLinearGradient(lx-38,0,lx+38,0);
    fg.addColorStop(0,'rgba(255,30,40,0)');
    fg.addColorStop(0.5,'rgba(255,50,55,0.55)');
    fg.addColorStop(1,'rgba(255,30,40,0)');
    ctx.fillStyle=fg; roundRect(lx-40,bandY-1,80,bandH+2,6); ctx.fill();
  }
  ctx.globalCompositeOperation='source-over';
  // écusson central
  ctx.fillStyle=rgb(sky.sun,0.6);
  ctx.beginPath(); ctx.arc(0,bandY+bandH/2,4,0,7); ctx.fill();

  // --- pare-chocs bas + plaque ---
  ctx.fillStyle=rgb(redLo);
  roundRect(-150,bandY+bandH,300,14,4); ctx.fill();
  // plaque d'immatriculation
  ctx.fillStyle='#e8e4d8';
  roundRect(-30,bandY+bandH+2,60,10,2); ctx.fill();
  ctx.fillStyle='#1a2a5a'; ctx.font='7px Georgia'; ctx.textAlign='center';
  ctx.fillText('NKY 8074', 0, bandY+bandH+9.5);
  ctx.textAlign='left';

  // --- 4 échappements groupés au centre (signature Testarossa) ---
  const exY=bandY+bandH+18;
  ctx.fillStyle=chrome;
  for(let i=0;i<4;i++){ ctx.beginPath(); ctx.arc(-15+i*10,exY,4,0,7); ctx.fill(); }
  ctx.fillStyle='#050505';
  for(let i=0;i<4;i++){ ctx.beginPath(); ctx.arc(-15+i*10,exY,2.2,0,7); ctx.fill(); }

  // --- diffuseur ---
  ctx.fillStyle='#08080b';
  roundRect(-70,exY-4,140,10,3); ctx.fill();

  // reflet spéculaire mobile sur les épaules
  const spec=ctx.createRadialGradient(-40+Math.sin(time)*24,-4,2,-40,-4,100);
  spec.addColorStop(0, rgb(sky.sun,0.28));
  spec.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=spec; roundRect(-162,-2,324,20,10); ctx.fill();

  // --- jantes cinq branches (arches) ---
  for(const wx of [-138,138]){
    ctx.fillStyle='#0a0a0e'; ctx.beginPath(); ctx.arc(wx,48,16,0,7); ctx.fill();
    ctx.fillStyle=rgb(lerpCol([88,90,100],sky.sun,0.2));
    ctx.beginPath(); ctx.arc(wx,48,10,0,7); ctx.fill();
    ctx.strokeStyle=chrome; ctx.lineWidth=1.6;
    for(let s=0;s<5;s++){ const a=s*(Math.PI*2/5)+time*speed*0.1;
      ctx.beginPath(); ctx.moveTo(wx,48); ctx.lineTo(wx+Math.cos(a)*9,48+Math.sin(a)*9); ctx.stroke(); }
    ctx.fillStyle=chrome; ctx.beginPath(); ctx.arc(wx,48,3,0,7); ctx.fill();
  }

  ctx.restore();

  // halo des phares projeté devant (sur la route)
  if(dayT>0.35){
    const ha=(dayT-0.35)/0.65;
    const hg=ctx.createRadialGradient(cx,y-6,4,cx,y-160,260);
    hg.addColorStop(0,`rgba(255,240,200,${0.10*ha})`);
    hg.addColorStop(1,'rgba(255,240,200,0)');
    ctx.fillStyle=hg;
    ctx.beginPath(); ctx.moveTo(cx-30,y); ctx.lineTo(cx-200,y-200);
    ctx.lineTo(cx+200,y-200); ctx.lineTo(cx+30,y); ctx.fill();
  }
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

// ---------- reflets à collecter ----------
function updateLights(top, sky){
  if(started && Math.random()<0.03 && lights.length<6){
    lights.push({z:960, x:(Math.random()-0.5)*1.4, phase:Math.random()*6});
  }
  const cx=W/2;
  for(let i=lights.length-1;i>=0;i--){
    const L=lights[i];
    L.z-=speed*1.2;
    const p=1-L.z/960;
    if(p<0.02){ continue; }
    if(L.z<8){ lights.splice(i,1); continue; }
    const y=top+(H-top)*p*p;
    const bend=curve*(1-p)*(1-p)*W*0.9;
    const w=lerp(W*0.14,W*0.95,p);
    const cxx=cx+bend - carX*lerp(20,140,p);
    const lx=cxx+L.x*w*0.4;
    const r=lerp(2,16,p);
    const tw=0.6+0.4*Math.sin(time*4+L.phase);
    const gg=ctx.createRadialGradient(lx,y,0,lx,y,r*2.5);
    gg.addColorStop(0, rgb(sky.sun, 0.95*tw));
    gg.addColorStop(1, rgb(sky.sun,0));
    ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(lx,y,r*2.5,0,7); ctx.fill();
    // collecte quand proche du bas et centré
    if(p>0.86 && Math.abs(L.x - carX)<0.35){
      collected++; lights.splice(i,1);
    }
  }
}

// ---------- update ----------
function update(){
  const a = carChoice.accel;

  // --- BOOST : espace, si jauge dispo. Dépasse temporairement la vmax ---
  boosting = (keys[' ']===true) && boost>0.02;
  const boostCap = boosting ? maxSpeed*1.35 : maxSpeed;   // plafond relevé pendant le boost
  if(boosting){ boost=Math.max(0, boost-0.010); boostFlash=Math.min(1,boostFlash+0.15); }
  else { boostFlash=Math.max(0,boostFlash-0.06); }

  // accélération non-linéaire vers le plafond courant
  if(keys.ArrowUp || boosting){
    const room = 1 - speed/boostCap;
    speed += a * (0.3 + Math.max(0,room)) * (boosting?1.8:1);
  } else {
    speed -= 0.05;                       // frein moteur
  }
  if(keys.ArrowDown) speed -= 0.22;      // frein
  // au-delà de la vmax normale (fin de boost), la vitesse retombe vite
  if(!boosting && speed>maxSpeed) speed -= (speed-maxSpeed)*0.06;
  speed=Math.max(0, Math.min(boostCap, speed));

  const sp = speed/maxSpeed;             // 0..1 (peut dépasser 1 en boost)

  // ================= DÉRAPAGE EN VIRAGE =================
  // charge latérale = combien la courbe te tire, selon vitesse²
  const lateral = Math.abs(curve) * sp * sp;
  // seuil de tenue propre à la voiture ; au-delà, on perd de l'adhérence
  const threshold = 0.42 * carChoice.grip;
  if(lateral > threshold){
    grip = Math.min(1, grip + (lateral-threshold)*0.9);
  } else {
    grip = Math.max(0, grip - 0.04);
  }
  // conséquences du dérapage : on part vers l'extérieur ET on perd de la vitesse
  if(grip>0.01){
    carVX += Math.sign(curve) * grip * 0.9;         // chasse de l'arrière
    speed -= grip * sp * 0.9;                        // scrub de vitesse : rester à fond punit
    shake = Math.max(shake, grip*4);
  }

  // direction (contre-braquage possible pour rattraper)
  const steerPow = 0.05 * (0.35 + sp*0.9);
  if(keys.ArrowLeft)  carVX -= steerPow;
  if(keys.ArrowRight) carVX += steerPow;
  carVX += curve * 0.05 * sp / carChoice.grip;
  carVX *= 0.86;
  carX += carVX * 0.06;

  // bords : sortir de la route coûte cher (herbe = grosse perte de vitesse)
  if(Math.abs(carX)>1.0){
    speed -= sp*1.4;                       // pénalité off-road
  }
  if(carX> 1.25){ carX=1.25; carVX*=-0.3; }
  if(carX<-1.25){ carX=-1.25; carVX*=-0.3; }
  speed=Math.max(0,speed);

  // recharge du boost : uniquement en roulant PROPREMENT (pas de dérapage, pas d'herbe)
  const clean = grip<0.05 && Math.abs(carX)<0.95 && sp>0.3;
  if(clean && !boosting) boost=Math.min(1, boost + 0.0035);

  // route qui serpente
  if(Math.random()<0.010) targetCurve=(Math.random()-0.5)*1.9;
  curve+=(targetCurve-curve)*0.018;

  roadPos+=speed;
  dayT=Math.min(1, roadPos/12000);

  const targetKmh = (speed/maxSpeed)*carChoice.vmax;
  kmh += (targetKmh - kmh)*0.12;

  shake = Math.max(shake, sp*0.6);

  updateRadars();
}

function updateRadars(){
  for(const r of radars){
    const prevAhead = r.z - (roadPos - speed);
    const nowAhead  = r.z - roadPos;
    if(prevAhead>0 && nowAhead<=0){
      const passed=Math.round(kmh);
      const isRecord = passed>r.best;
      if(isRecord) r.best=passed;
      showRadar(passed, r.best, isRecord);
      r.z += radars.length*900 + 400;
    }
  }
  if(radarAlertT>0){ radarAlertT-=0.016; if(radarAlertT<=0) radarAlertEl.classList.remove('show'); }
}

function showRadar(v, best, record){
  radarAlertEl.className = 'show' + (record?' record':'');
  radarAlertEl.innerHTML =
    `<div class="big">${v}<span style="font-size:20px;letter-spacing:2px"> km/h</span></div>`+
    `<div class="lbl">${record?'nouveau record':'record '+best+' km/h'}</div>`;
  radarAlertT=1.6;
}

function updateHud(){
  const totalMin = 18*60+42 + Math.floor(roadPos*0.03);
  const hh=String(Math.floor(totalMin/60)%24).padStart(2,'0');
  const mm=String(totalMin%60).padStart(2,'0');
  clockEl.textContent=`${hh}:${mm}`;
  const km=(roadPos/300).toFixed(1);
  distEl.textContent=`RIVIERA · ${km} KM · ${collected} ✦`;
  if(started) drawDial();
}

// ---------- menu garage : vignettes de voitures ----------
function buildGarage(){
  const g=document.getElementById('garage');
  g.innerHTML='';
  CARS.forEach(car=>{
    const card=document.createElement('div');
    card.className='carCard'+(car.id===carChoice.id?' sel':'');
    const cv2=document.createElement('canvas'); cv2.width=252; cv2.height=128;
    drawCarThumb(cv2.getContext('2d'), car);
    card.appendChild(cv2);
    const nm=document.createElement('div'); nm.className='nm'; nm.textContent=car.name;
    card.appendChild(nm);
    card.onclick=()=>{ carChoice=car; buildGarage(); showSpecs(); };
    g.appendChild(card);
  });
}
function showSpecs(){
  document.getElementById('specs').innerHTML=
    `V-MAX ${carChoice.vmax} KM/H &nbsp;·&nbsp; ACCÉL ${'▮'.repeat(Math.round(carChoice.accel*40))} &nbsp;·&nbsp; TENUE ${'▮'.repeat(Math.round(carChoice.grip*6))}`;
}
// vignette : voiture vue de dessus/derrière simplifiée aux couleurs du modèle
function drawCarThumb(c, car){
  const w=252,h=128; c.clearRect(0,0,w,h);
  const cx=w/2, cy=h*0.6;
  const hi=`rgb(${car.body.map(v=>Math.min(255,v+40)).join(',')})`;
  const mid=`rgb(${car.body.join(',')})`;
  const lo=`rgb(${car.body.map(v=>v*0.55|0).join(',')})`;
  // ombre
  c.fillStyle='rgba(0,0,0,0.35)'; c.beginPath(); c.ellipse(cx,cy+34,96,16,0,0,7); c.fill();
  // corps
  const g=c.createLinearGradient(0,cy-30,0,cy+34);
  g.addColorStop(0,hi); g.addColorStop(0.5,mid); g.addColorStop(1,lo);
  c.fillStyle=g;
  c.beginPath();
  c.moveTo(cx-100,cy+30); c.quadraticCurveTo(cx-104,cy-4,cx-70,cy-8);
  c.quadraticCurveTo(cx-54,cy-30,cx-20,cy-32); c.lineTo(cx+20,cy-32);
  c.quadraticCurveTo(cx+54,cy-30,cx+70,cy-8);
  c.quadraticCurveTo(cx+104,cy-4,cx+100,cy+30);
  c.quadraticCurveTo(cx+100,cy+38,cx+70,cy+38); c.lineTo(cx-70,cy+38);
  c.quadraticCurveTo(cx-100,cy+38,cx-100,cy+30); c.closePath(); c.fill();
  // vitre
  const wg=c.createLinearGradient(0,cy-30,0,cy+6);
  wg.addColorStop(0,'rgba(255,230,190,0.5)'); wg.addColorStop(1,'rgba(20,18,30,0.9)');
  c.fillStyle=wg;
  c.beginPath(); c.moveTo(cx-34,cy-28); c.quadraticCurveTo(cx-40,cy-6,cx-32,cy+6);
  c.lineTo(cx+32,cy+6); c.quadraticCurveTo(cx+40,cy-6,cx+34,cy-28); c.closePath(); c.fill();
  // feux
  c.fillStyle='rgba(255,50,60,0.9)'; c.fillRect(cx-92,cy+12,180,7);
  // reflet
  c.fillStyle='rgba(255,255,255,0.12)'; c.fillRect(cx-100,cy-2,200,4);
}

// ---------- compteur de vitesse (aiguille) ----------
const dialCv=document.getElementById('dial');
const dialCtx=dialCv.getContext('2d');
function drawDial(){
  const c=dialCtx, S=180, r=76, cx=S/2, cy=S/2;
  c.clearRect(0,0,S,S);
  // cadran
  c.beginPath(); c.arc(cx,cy,r+8,0,7);
  c.fillStyle='rgba(14,10,20,0.55)'; c.fill();
  c.lineWidth=2; c.strokeStyle='rgba(232,184,120,0.3)'; c.stroke();
  const a0=Math.PI*0.75, a1=Math.PI*2.25;   // de 135° à 405°
  const vmax=carChoice.vmax;
  // graduations
  for(let i=0;i<=vmax;i+=20){
    const t=i/vmax, ang=a0+(a1-a0)*t;
    const big=i%40===0;
    const r1=r-(big?12:7), r2=r;
    c.strokeStyle=big?'rgba(244,232,212,0.8)':'rgba(244,232,212,0.35)';
    c.lineWidth=big?2:1;
    c.beginPath();
    c.moveTo(cx+Math.cos(ang)*r1, cy+Math.sin(ang)*r1);
    c.lineTo(cx+Math.cos(ang)*r2, cy+Math.sin(ang)*r2); c.stroke();
  }
  // arc de vitesse actuelle (glow) — peut dépasser le cadran en boost
  const tv=Math.min(1.18, kmh/vmax);
  c.beginPath(); c.arc(cx,cy,r+3,a0,a0+(a1-a0)*Math.min(1,tv));
  c.lineWidth=3; c.strokeStyle=boosting?'rgba(138,255,192,0.9)':'rgba(232,184,120,0.8)'; c.stroke();
  // aiguille
  const ang=a0+(a1-a0)*tv;
  c.strokeStyle=boosting?'#8affc0':'#ffcf7a'; c.lineWidth=3; c.lineCap='round';
  c.beginPath(); c.moveTo(cx-Math.cos(ang)*10, cy-Math.sin(ang)*10);
  c.lineTo(cx+Math.cos(ang)*(r-14), cy+Math.sin(ang)*(r-14)); c.stroke();
  c.beginPath(); c.arc(cx,cy,5,0,7); c.fillStyle=boosting?'#8affc0':'#ffcf7a'; c.fill();
  // valeur
  c.fillStyle='#f4e8d4'; c.textAlign='center'; c.font='26px Georgia';
  c.fillText(Math.round(kmh), cx, cy+28);
  c.font='9px Georgia'; c.fillStyle='rgba(244,232,212,0.5)';
  c.fillText('KM/H', cx, cy+40);

  // --- jauge de boost (arc bas) ---
  const bg0=Math.PI*0.62, bg1=Math.PI*0.38;   // petit arc en bas
  c.beginPath(); c.arc(cx,cy,r-4, bg0, bg1, false);
  c.lineWidth=4; c.strokeStyle='rgba(255,255,255,0.12)'; c.stroke();
  c.beginPath(); c.arc(cx,cy,r-4, bg0, bg0+(bg1+Math.PI*2-bg0)*boost, false);
  c.lineWidth=4;
  c.strokeStyle = boost>0.25 ? 'rgba(138,255,192,0.9)' : 'rgba(255,120,120,0.9)';
  c.stroke();
  c.font='8px Georgia'; c.fillStyle='rgba(244,232,212,0.5)';
  c.fillText('TURBO', cx, cy+58);
}

// ---------- démarrage ----------
function startDrive(){
  maxSpeed = 10 + carChoice.accel*30;     // vmax interne dérivée
  started=true;
  titleEl.classList.add('hidden');
  document.getElementById('speedo').classList.add('on');
}
buildGarage(); showSpecs();
document.getElementById('startBtn').addEventListener('click', startDrive);

requestAnimationFrame(loop);
</script>
